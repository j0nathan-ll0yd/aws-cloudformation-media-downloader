name: Auto-Update GraphRAG

on:
  push:
    branches:
      - master
    paths:
      - 'src/lambdas/**'
      - 'src/entities/**'
      - 'src/lib/vendor/**'
      - 'graphrag/metadata.json'
      - 'tsp/**'

permissions: {}

jobs:
  update-graphrag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH for mantle checkout
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MANTLE_DEPLOY_KEY }}" > ~/.ssh/mantle_deploy_key
          chmod 600 ~/.ssh/mantle_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Checkout mantle framework
        run: GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}" git@github.com:j0nathan-ll0yd/mantle.git ../mantle || GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch main git@github.com:j0nathan-ll0yd/mantle.git ../mantle

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install mantle dependencies
        working-directory: ../mantle
        run: pnpm install --frozen-lockfile
      - name: Build mantle packages
        working-directory: ../mantle
        run: pnpm build
      - name: Refresh bin links after mantle build
        run: pnpm install

      - name: Generate dependency graph
        run: npx mantle generate graph

      - name: Update GraphRAG knowledge graph
        run: pnpm run graphrag:extract

      - name: Commit updated knowledge graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphrag/knowledge-graph.json
          if git diff --staged --quiet; then
            echo "No changes to knowledge graph"
          else
            git commit -m "chore: update GraphRAG knowledge graph"
            git push
          fi
