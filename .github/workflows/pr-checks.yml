name: PR Checks

on:
  pull_request:
    branches: [master, main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Quick validation (no build required)
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH for mantle checkout
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MANTLE_DEPLOY_KEY }}" > ~/.ssh/mantle_deploy_key
          chmod 600 ~/.ssh/mantle_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Checkout mantle framework
        run: GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch main git@github.com:j0nathan-ll0yd/mantle.git ../mantle

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install mantle dependencies
        working-directory: ../mantle
        run: pnpm install --frozen-lockfile
      - name: Build mantle packages
        working-directory: ../mantle
        run: pnpm build

      - name: Cache TypeSpec output
        uses: actions/cache@v5
        with:
          path: tsp-output/
          key: typespec-${{ runner.os }}-${{ hashFiles('tsp/**') }}
          restore-keys: |
            typespec-${{ runner.os }}-

      - name: TypeSpec Check
        run: pnpm run typespec:check

      - name: Format Check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

  # Full CI (depends on quick checks)
  full-ci:
    needs: quick-checks
    uses: ./.github/workflows/unit-tests.yml

  integration:
    needs: quick-checks
    uses: ./.github/workflows/integration-tests.yml

  # Final status check for branch protection
  pr-ready:
    needs: [full-ci, integration]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.full-ci.result }}" != "success" ]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "::error::Integration tests failed"
            exit 1
          fi
          echo "All checks passed!"

      - name: Post summary
        run: |
          echo "## PR Check Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quick Checks | ${{ needs.quick-checks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | ${{ needs.full-ci.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration Tests | ${{ needs.integration.result }} |" >> "$GITHUB_STEP_SUMMARY"
