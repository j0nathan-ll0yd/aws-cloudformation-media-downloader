name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm run lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm run build
      - name: Verify Lambda outputs
        run: |
          count=$(ls -d build/lambdas/*/ 2>/dev/null | wc -l)
          echo "Built ${count} Lambda functions"
          if [ "$count" -lt 18 ]; then
            echo "::error::Expected 18 Lambda functions, got ${count}"
            exit 1
          fi

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
      - name: Start LocalStack
        run: docker compose -f docker-compose.localstack.yml up -d
      - name: Wait for LocalStack
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"running"'; then
              echo "LocalStack ready"
              break
            fi
            sleep 2
          done
      - run: pnpm run test:integration
      - name: Stop LocalStack
        if: always()
        run: docker compose -f docker-compose.localstack.yml down

  ci-ready:
    name: CI Ready
    needs: [typecheck, lint, format, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results=("${{ needs.typecheck.result }}" "${{ needs.lint.result }}" "${{ needs.format.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}")
          for result in "${results[@]}"; do
            if [ "$result" != "success" ]; then
              echo "::error::One or more CI jobs failed"
              exit 1
            fi
          done
          echo "All CI checks passed"
