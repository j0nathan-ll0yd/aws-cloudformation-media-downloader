name: Deploy to Production

on:
  # push trigger disabled — re-enable after production deploys are ready
  # push:
  #   branches: [main]
  #   paths:
  #     - 'infra/**'
  #     - 'src/**'
  #     - 'package.json'
  #     - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

permissions: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  TOFU_VERSION: '1.8.0'

jobs:
  # ==========================================================================
  # Build & Test
  # ==========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH for mantle checkout
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MANTLE_DEPLOY_KEY }}" > ~/.ssh/mantle_deploy_key
          chmod 600 ~/.ssh/mantle_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Checkout mantle framework
        run: GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}" git@github.com:j0nathan-ll0yd/mantle.git ../mantle || GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch main git@github.com:j0nathan-ll0yd/mantle.git ../mantle

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install mantle dependencies
        working-directory: ../mantle
        run: pnpm install --frozen-lockfile
      - name: Build mantle packages
        working-directory: ../mantle
        run: pnpm build
      - name: Refresh bin links after mantle build
        run: pnpm install

      - uses: ./.github/actions/setup-homebrew-tools

      - name: Setup SOPS
        uses: ./.github/actions/setup-sops

      - name: Decrypt YouTube cookies
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops decrypt --output-type binary \
            layers/yt-dlp/cookies/youtube-cookies.enc > layers/yt-dlp/cookies/youtube-cookies.txt

      - name: Build
        run: pnpm run build

      - name: Run unit tests
        run: pnpm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            build/
            infra/*.tf
            layers/
          retention-days: 1

  # ==========================================================================
  # Deploy Production (automatic on merge to main)
  # ==========================================================================
  deploy-production:
    # TEMPORARILY DISABLED: Re-enable after repo rename and CI stabilization
    if: false
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production  # No approval required - auto-deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check AWS credentials configuration
        id: check-creds
        run: |
          if [ -z "${{ secrets.AWS_ROLE_PRODUCTION }}" ]; then
            echo "::warning::AWS_ROLE_PRODUCTION secret is not configured. Skipping production deployment."
            echo "::notice::To enable production deployments, configure the AWS_ROLE_PRODUCTION secret with your IAM role ARN."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check-creds.outputs.configured == 'true'

      - name: Validate manual trigger
        if: steps.check-creds.outputs.configured == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "::error::You must type 'deploy' to confirm production deployment"
            exit 1
          fi

      - name: Download build artifacts
        if: steps.check-creds.outputs.configured == 'true'
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts

      - name: Setup OpenTofu
        if: steps.check-creds.outputs.configured == 'true'
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb  # v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Configure AWS credentials (Production)
        if: steps.check-creds.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SOPS
        if: steps.check-creds.outputs.configured == 'true'
        uses: ./.github/actions/setup-sops

      - name: Decrypt production secrets
        if: steps.check-creds.outputs.configured == 'true'
        run: |
          echo "${{ secrets.SOPS_AGE_KEY }}" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops --decrypt secrets.prod.enc.yaml > secrets.prod.yaml
          sops decrypt --output-type binary \
            layers/yt-dlp/cookies/youtube-cookies.enc > layers/yt-dlp/cookies/youtube-cookies.txt

      - name: Build Lambda layers
        if: steps.check-creds.outputs.configured == 'true'
        run: |
          ./bin/build-deno-layer.sh
          ./bin/build-bgutil-layer.sh

      - name: Deploy to Production
        if: steps.check-creds.outputs.configured == 'true'
        env:
          SOPS_AGE_KEY_FILE: /tmp/age-key.txt
        run: npx mantle deploy --stage production

      - name: Post deployment notification
        if: steps.check-creds.outputs.configured == 'true' && success()
        run: |
          echo "::notice::Production deployment successful! Commit: ${{ github.sha }}"

      - name: Skip notification
        if: steps.check-creds.outputs.configured != 'true'
        run: |
          echo "::notice::Production deployment skipped - AWS_ROLE_PRODUCTION not configured"
