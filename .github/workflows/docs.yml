name: Documentation

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/wiki/**/*.md'
      - '.vale.ini'
      - '.vale/**'

permissions: {}

jobs:
  vale:
    name: Lint Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Vale
        run: |
          wget -q https://github.com/errata-ai/vale/releases/download/v3.14.1/vale_3.14.1_Linux_64-bit.tar.gz
          tar -xzf vale_3.14.1_Linux_64-bit.tar.gz vale
          sudo mv vale /usr/local/bin/
      - name: Vale Sync
        run: vale sync
      - name: Vale Linter
        run: vale docs/wiki/
