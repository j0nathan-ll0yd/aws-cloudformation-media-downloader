name: PR Title
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef6e5e9c1bdde8b5f1f8b08  # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            refactor
            test
            style
            ci
            docs
            perf
            revert
