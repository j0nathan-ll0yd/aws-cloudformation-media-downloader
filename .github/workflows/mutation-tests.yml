name: Weekly Mutation Tests

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 6 AM UTC
  workflow_dispatch:

permissions: {}

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH for mantle checkout
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MANTLE_DEPLOY_KEY }}" > ~/.ssh/mantle_deploy_key
          chmod 600 ~/.ssh/mantle_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Checkout mantle framework
        run: GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}" git@github.com:j0nathan-ll0yd/mantle.git ../mantle || GIT_SSH_COMMAND="ssh -i ~/.ssh/mantle_deploy_key -o StrictHostKeyChecking=no" git clone --depth 1 --branch main git@github.com:j0nathan-ll0yd/mantle.git ../mantle

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install mantle dependencies
        working-directory: ../mantle
        run: pnpm install --frozen-lockfile
      - name: Build mantle packages
        working-directory: ../mantle
        run: pnpm build
      - name: Refresh bin links after mantle build
        run: pnpm install

      - uses: ./.github/actions/setup-homebrew-tools

      - name: Setup SOPS
        uses: ./.github/actions/setup-sops

      - name: Decrypt YouTube cookies
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops decrypt --output-type binary \
            layers/yt-dlp/cookies/youtube-cookies.enc > layers/yt-dlp/cookies/youtube-cookies.txt

      - name: Setup reports directory
        run: mkdir -p reports/mutation

      - uses: ./.github/actions/build-project

      - name: Download previous incremental file
        run: |
          RUN_ID=$(gh run list --workflow mutation-tests.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::warning::No previous successful mutation test run found. Running full mutation test."
            exit 0
          fi
          echo "Downloading incremental file from run $RUN_ID"
          if ! gh run download "$RUN_ID" -n stryker-incremental -D reports/; then
            echo "::warning::Failed to download incremental file (artifact may have expired). Running full mutation test."
            exit 0
          fi
          echo "Successfully downloaded incremental file"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run mutation tests
        run: pnpm run test:mutation:incremental
        env:
          CI: true
          LOG_LEVEL: SILENT

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30

      - name: Upload incremental file
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: stryker-incremental
          path: reports/stryker-incremental.json
          retention-days: 90

      - name: Post mutation score to job summary
        if: always() && hashFiles('reports/mutation/mutation.json') != ''
        run: |
          echo "## Mutation Testing Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          SCORE=$(jq '.mutationScore' reports/mutation/mutation.json)
          echo "**Mutation Score:** ${SCORE}%" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          KILLED=$(jq '.killed' reports/mutation/mutation.json)
          SURVIVED=$(jq '.survived' reports/mutation/mutation.json)
          TIMEOUT=$(jq '.timeout' reports/mutation/mutation.json)
          NO_COVERAGE=$(jq '.noCoverage' reports/mutation/mutation.json)
          echo "| Killed | ${KILLED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Survived | ${SURVIVED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timeout | ${TIMEOUT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| No Coverage | ${NO_COVERAGE} |" >> "$GITHUB_STEP_SUMMARY"
