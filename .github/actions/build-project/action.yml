name: 'Build Project'
description: 'Run full project build with dependency graph generation'

inputs:
  cache-build:
    description: 'Whether to cache build output'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup directories
      shell: bash
      run: mkdir -p build

    - name: Cache build output
      if: inputs.cache-build == 'true'
      uses: actions/cache@v4
      with:
        path: |
          build
        key: build-${{ runner.os }}-${{ hashFiles('src/**') }}
        restore-keys: |
          build-${{ runner.os }}-

    - name: Cache Turborepo
      uses: actions/cache@v4
      with:
        path: |
          .turbo
          ../mantle/.turbo
        key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
          ${{ runner.os }}-turbo-

    - name: Generate dependency graph
      shell: bash
      run: node ../mantle/packages/cli/dist/index.mjs generate graph

    - name: Build
      shell: bash
      run: pnpm run build
